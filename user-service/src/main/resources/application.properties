spring.application.name=user-service
server.port=8081

spring.datasource.url = jdbc:mysql://localhost:3306/buyzone_user_service?createDatabaseIfNotExist=true
spring.datasource.username = root
spring.datasource.password = root

#To create a table, we need to give DDL permission to Hibernate
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost

# Kafka
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.producer.properties.spring.json.add.type.headers=false

#If not configured then spring will give password itself
